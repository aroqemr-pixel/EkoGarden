<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eko/Garden Peyzaj — Fide Kataloğu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --g0:#0d1a0f;--g1:#1a2e1c;--g2:#2d6a4f;--g3:#4a8c6a;--g4:#7ab896;
  --g5:#b5d5c0;--g6:#e8f2ec;--g7:#f5faf7;
  --amber:#c8860a;--amber-bg:#fff8e1;
  --lblue:#1565c0;--blue-bg:#e3f2fd;
  --purple:#6a1b9a;--purple-bg:#f3e5f5;
  --cream:#faf8f4;--parchment:#ede8dc;--muted:#6b7280;
  --shadow:rgba(13,26,15,0.10);--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--g0);min-height:100vh}

.topbar{height:90px;background:linear-gradient(135deg,#0a1628 0%,#0d2318 50%,#0a1628 100%);display:flex;align-items:center;justify-content:space-between;padding:0 1.8rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.06)}
.topbar span{color:rgba(255,255,255,.4);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase}

.cat-hero{background:linear-gradient(160deg,#0a1628 0%,#0d2a1c 55%,#081510 100%);padding:3.5rem 1.5rem 3rem;text-align:center;position:relative;overflow:hidden}
.cat-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(26,79,160,.12) 0%,transparent 55%),radial-gradient(ellipse at 75% 40%,rgba(45,106,79,.18) 0%,transparent 55%);pointer-events:none}
.cat-hero h1{font-family:'Cormorant Garamond',serif;color:#fff;font-size:2rem;font-weight:600;position:relative;margin-top:.5rem}
.cat-hero h1 em{color:var(--g4);font-style:italic}
.cat-hero p{color:rgba(255,255,255,.5);font-size:.82rem;margin-top:.4rem;position:relative;letter-spacing:.05em;text-transform:uppercase}
.cat-hero-meta{display:flex;gap:1rem;justify-content:center;margin-top:1.3rem;flex-wrap:wrap;position:relative}
.hero-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);padding:.3rem .9rem;border-radius:20px;font-size:.74rem}

.fbar{background:#fff;padding:.75rem 1.5rem;display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--parchment);position:sticky;top:90px;z-index:100;box-shadow:0 2px 8px var(--shadow)}
.fsearch{flex:1;min-width:180px;padding:.55rem 1rem;border:1.5px solid var(--parchment);border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;background:var(--g7);outline:none;transition:border-color .18s}
.fsearch:focus{border-color:var(--g3)}
.ftabs{display:flex;gap:.4rem;flex-wrap:wrap}
.ftab{padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--parchment);background:none;cursor:pointer;font-size:.76rem;font-family:'Inter',sans-serif;color:var(--muted);transition:all .18s;font-weight:500}
.ftab:hover{border-color:var(--g3);color:var(--g2)}.ftab.on{background:var(--g2);color:#fff;border-color:var(--g2)}
.fcount{font-size:.78rem;color:var(--muted);white-space:nowrap;margin-left:auto}

.grid-wrap{padding:1.5rem;max-width:1280px;margin:0 auto}
.cat-label{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--g2);letter-spacing:.08em;text-transform:uppercase;border-left:3px solid var(--g3);padding-left:.7rem;margin:1.5rem 0 .8rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem;margin-bottom:1rem}
.kart{background:#fff;border:1px solid var(--parchment);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s}
.kart:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow);border-color:var(--g5)}
.kimg{height:130px;background:var(--g7);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.kimg img{width:100%;height:130px;object-fit:cover;transition:transform .3s}
.kart:hover .kimg img{transform:scale(1.04)}
.kimg-ph{font-size:2.8rem;opacity:.45}
.kbadge{position:absolute;top:7px;right:7px;padding:.2rem .55rem;border-radius:12px;font-size:.68rem;font-weight:600;background:var(--g2);color:#fff}
.kinfo{padding:.7rem .85rem .85rem}
.klatince{font-size:.8rem;font-style:italic;color:var(--g2);font-weight:500;line-height:1.3}
.kturkce{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.kcesit{font-size:.7rem;color:var(--amber);font-weight:600;margin-top:.2rem}
.kmeta{display:flex;gap:4px;flex-wrap:wrap;margin-top:.55rem}
.tag{padding:.18rem .5rem;border-radius:4px;font-size:.68rem;font-weight:500}
.tag.art{background:var(--g6);color:var(--g2)}.tag.fiy{background:var(--amber-bg);color:var(--amber);font-weight:700}
.tag.haf{background:var(--blue-bg);color:var(--lblue)}.tag.tr{background:var(--purple-bg);color:var(--purple)}
.knot{font-size:.68rem;color:var(--muted);margin-top:.45rem;padding-top:.45rem;border-top:1px solid var(--g6);line-height:1.4}
.no-res{text-align:center;padding:4rem 2rem;color:var(--muted)}

.overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.7);backdrop-filter:blur(5px);z-index:500;align-items:center;justify-content:center;padding:1rem}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:su .28s ease}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.modal-img{height:320px;background:var(--g7);overflow:hidden;position:relative}
.modal-img img{width:100%;height:100%;object-fit:cover;object-position:center}
.modal-img-ph{height:220px;background:var(--g6);display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:.4;position:relative}
.modal-body{padding:1.5rem}
.modal-cat{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g3);margin-bottom:.3rem}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600}
.modal-cesit{color:var(--amber);font-size:.85rem;font-weight:600;margin-top:.2rem}
.modal-chips{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}
.chip{display:flex;flex-direction:column;align-items:center;background:var(--g7);border:1px solid var(--g6);border-radius:8px;padding:.5rem .8rem;min-width:80px}
.chip-label{font-size:.65rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.2rem}
.chip-val{font-size:.88rem;font-weight:600}.chip-val.price{color:var(--amber)}
.modal-not{background:var(--g7);border-radius:8px;padding:.7rem .9rem;font-size:.8rem;color:var(--muted);margin-top:.8rem;line-height:1.5}
.mcls{position:absolute;top:.8rem;right:.8rem;width:32px;height:32px;background:rgba(0,0,0,.4);border:none;border-radius:50%;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mcls:hover{background:rgba(0,0,0,.65)}

.pagination{display:flex;gap:.4rem;justify-content:center;padding:1.5rem 0;flex-wrap:wrap}
.ppage{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--parchment);background:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;color:var(--muted);transition:all .18s;display:flex;align-items:center;justify-content:center}
.ppage:hover{border-color:var(--g3);color:var(--g2)}.ppage.on{background:var(--g2);color:#fff;border-color:var(--g2)}
.pprev,.pnext{padding:0 .8rem;width:auto}

.footer{background:var(--g0);padding:2rem 1.5rem;text-align:center;margin-top:2rem}
.footer p{color:rgba(255,255,255,.35);font-size:.72rem;margin-top:.7rem;letter-spacing:.04em}

@media(max-width:640px){
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem}
  .topbar{height:60px;padding:0 1rem}
  .cat-hero{padding:2.5rem 1rem 2rem}
}
</style>
</head>

<nav class="topbar">
  <img id="logo-top" style="height:100px;width:auto;cursor:pointer" alt="Eko/Garden Peyzaj">
  <span>FİDE KATALOĞU 2026</span>
</nav>

<div class="cat-hero">
  <img id="logo-hero" style="height:200px;width:auto;margin-bottom:1.5rem;filter:drop-shadow(0 4px 16px rgba(0,0,0,.25))" alt="Eko/Garden Peyzaj">
  <h1>Fide &amp; Bitki <em>Kataloğu</em></h1>
  <p>Profesyonel Fide Tedariki · 2026</p>
  <div class="cat-hero-meta">
    <span class="hero-pill" id="hp-total">— ürün</span>

<div class="fbar">

<div class="grid-wrap" id="grid-wrap"></div>
<div class="pagination" id="pagination"></div>

<div class="footer">
  <img id="logo-footer" style="height:70px;width:auto;opacity:.9" alt="Eko/Garden Peyzaj">
  <p>© 2026 Eko/Garden Peyzaj · Tüm hakları saklıdır</p>
</div>

<div class="overlay" id="modal-ov" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">

    <div class="modal-body">
      <div class="modal-cat" id="m-cat"></div>

      <div id="m-tur" style="font-size:.82rem;color:var(--muted);margin-top:.15rem;font-style:italic"></div>
      <div class="modal-cesit" id="m-ces"></div>
      <div class="modal-chips" id="m-chips"></div>
      <div id="m-not"></div>
    </div>
  </div>
</div>

let activeCat = 'Tümü';
let currentPage = 1;

async function init() {
  try {
    const res = await fetch(API + '?action=getProducts');
    const data = await res.json();
    if (data.products && data.products.length > 0)
      PRODUCTS = data.products.map(p => ({...p, id:Number(p.id)||p.id}));
  } catch(e) {}
  renderUI();
}

function renderUI() {
  const cats = ['Tümü',...new Set(PRODUCTS.map(p=>p.cat).filter(Boolean))];
  document.getElementById('hp-total').textContent = PRODUCTS.length+' ürün';
  document.getElementById('hp-cats').textContent = (cats.length-1)+' kategori';
  document.getElementById('hp-date').textContent = new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('ftabs').innerHTML = cats.map(c=>
    `<button class="ftab${c===activeCat?' on':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
  currentPage=1; render();
}
function setCat(c){activeCat=c;currentPage=1;renderUI();}
function filterCat(){currentPage=1;render();}

function getFiltered(){
  const q=(document.getElementById('fsearch').value||'').toLowerCase().trim();
  return PRODUCTS.filter(p=>{
    const mc=activeCat==='Tümü'||p.cat===activeCat;
    if(!q) return mc;
    return mc&&((p.latince||'').toLowerCase().includes(q)||(p.turkce||'').toLowerCase().includes(q)||(p.cesit||'').toLowerCase().includes(q)||(p.artikel||'').toLowerCase().includes(q));
  });
}

function render(){
  const filtered=getFiltered();
  const totalPages=Math.ceil(filtered.length/ITEMS_PER_PAGE);
  const slice=filtered.slice((currentPage-1)*ITEMS_PER_PAGE,currentPage*ITEMS_PER_PAGE);
  document.getElementById('fcount').textContent=filtered.length+' ürün';
  const wrap=document.getElementById('grid-wrap');
  if(!filtered.length){wrap.innerHTML='<div class="no-res" style="font-size:3rem">🌱<br><span style="font-size:1rem">Sonuç bulunamadı.</span></div>';document.getElementById('pagination').innerHTML='';return;}
  if(activeCat==='Tümü'){
    const byCat={};
    slice.forEach(p=>{if(!byCat[p.cat])byCat[p.cat]=[];byCat[p.cat].push(p);});
    wrap.innerHTML=Object.entries(byCat).map(([cat,prods])=>
      `<div class="cat-label">${cat}</div><div class="pgrid">${prods.map(card).join('')}</div>`
    ).join('');
  } else {
    wrap.innerHTML=`<div class="pgrid">${slice.map(card).join('')}</div>`;
  }
  renderPages(totalPages);
}

function imgSrc(p){
  if(p.img&&p.img.startsWith('http')) return p.img;
  const art=(p.artikel||'').replace('#','').trim();
  return art?IMG_BASE+art+'.jpg':null;
}
function card(p){
  const src=imgSrc(p);
  const isNew=(p.not_text||'').toUpperCase().includes('YENİ');
  return `<div class="kart" onclick="openModal('${p.id}')">
    <div class="kimg">
      ${src?`<img src="${src}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}<div class="kimg-ph" style="${src?'display:none':''}">🌱</div>
      ${isNew?'<span class="kbadge">YENİ</span>':''}
    </div>
    <div class="kinfo">
      <div class="klatince">${p.latince||'—'}</div>
      ${p.turkce?`<div class="kturkce">${p.turkce}</div>`:''}
      ${p.cesit?`<div class="kcesit">${p.cesit}</div>`:''}
      <div class="kmeta">
        ${p.artikel?`<span class="tag art">${p.artikel}</span>`:''}
        ${p.fiyat?`<span class="tag fiy">${p.fiyat}</span>`:''}
        ${p.hafta?`<span class="tag haf">${p.hafta}</span>`:''}
        ${p.trey?`<span class="tag tr">${p.trey}</span>`:''}
      </div>
      ${p.not_text?`<div class="knot">${p.not_text}</div>`:''}
    </div>
  </div>`;
}

function renderPages(total){
  if(total<=1){document.getElementById('pagination').innerHTML='';return;}
  let html='';
  if(currentPage>1) html+=`<button class="ppage pprev" onclick="goPage(${currentPage-1})">‹ Önceki</button>`;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-currentPage)<=2) html+=`<button class="ppage${i===currentPage?' on':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-currentPage)===3) html+=`<span style="padding:0 .3rem;color:var(--muted)">…</span>`;
  }
  if(currentPage<total) html+=`<button class="ppage pnext" onclick="goPage(${currentPage+1})">Sonraki ›</button>`;
  document.getElementById('pagination').innerHTML=html;
}
function goPage(n){currentPage=n;render();window.scrollTo({top:document.getElementById('grid-wrap').offsetTop-130,behavior:'smooth'});}

function openModal(id){
  const p=PRODUCTS.find(x=>String(x.id)===String(id));if(!p)return;
  const src=imgSrc(p);
  document.getElementById('modal-img-wrap').innerHTML=src
    ?`<div class="modal-img"><img src="${src}" onerror="this.parentElement.innerHTML='<div class=modal-img-ph style=height:320px>🌱</div>'"><button class="mcls" onclick="closeModal()">✕</button></div>`
    :`<div class="modal-img-ph">🌱<button class="mcls" style="position:absolute;top:.8rem;right:.8rem" onclick="closeModal()">✕</button></div>`;
  document.getElementById('m-cat').textContent=p.cat||'';
  document.getElementById('m-lat').textContent=p.latince||'—';
  document.getElementById('m-tur').textContent=p.turkce||'';
  document.getElementById('m-ces').textContent=p.cesit||'';
  document.getElementById('m-chips').innerHTML=[
    p.artikel?`<div class="chip"><span class="chip-label">Artikel</span><span class="chip-val">${p.artikel}</span></div>`:'',
    p.fiyat?`<div class="chip"><span class="chip-label">Fiyat</span><span class="chip-val price">${p.fiyat}</span></div>`:'',
    p.hafta?`<div class="chip"><span class="chip-label">Teslimat</span><span class="chip-val">${p.hafta}</span></div>`:'',
    p.trey?`<div class="chip"><span class="chip-label">Paket</span><span class="chip-val">${p.trey}</span></div>`:'',
  ].join('');
  document.getElementById('m-not').innerHTML=p.not_text?`<div class="modal-not">${p.not_text}</div>`:'';
  document.getElementById('modal-ov').classList.add('on');
}
function closeModal(e){if(!e||e.target.id==='modal-ov') document.getElementById('modal-ov').classList.remove('on');}
init();
</script>
</body>
</html>
